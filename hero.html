<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brilliant Ashu — Web Designer</title>
</head>
<style>
  :root{
    --orange:#F04E23;
    --orange-dark:#D8431C;
    --ink:#1B1B1F;
    --muted:#6E6E76;
    --paper:#FFFFFF;
    --ring:purple;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family:'Poppins', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x:hidden;
  }

  .hero{
    position:relative;
    min-height: 100vh;
    display:grid;
    grid-template-columns: 1fr 0.85fr;
    align-items:center;
    gap: 2rem;
    max-width: 1240px;
    margin: 0 auto;
    padding: 6vh 6vw;
    overflow:hidden;
  }

  /* ---------- LEFT COLUMN ---------- */

  .copy{
    position:relative;
    z-index:2;
  }
  .copy h1{
    color: #4B0082;
  }

  .eyebrow{
    font-size: 1rem;
    font-weight:600;
    letter-spacing:.03em;
    color: var(--muted);
    margin-bottom: .35rem;
  }

  .name{
    font-size: 2rem;
    font-weight:700;
    color: var(--orange);
    letter-spacing:.02em;
    margin-bottom: 1rem;
  }

  h1{
    font-size: clamp(2.1rem, 4.4vw, 3.1rem);
    font-weight:800;
    line-height:1.15;
    color: var(--ink);
    max-width: 12ch;
  }

  .bio{
    margin-top: 1.4rem;
    max-width: 42ch;
    font-size: .98rem;
    line-height:1.75;
    color: var(--muted);
  }

  .actions{
    display:flex;
    align-items:center;
    gap: 1rem;
    margin-top: 2.2rem;
    flex-wrap:wrap;
  }

  .btn{
    display:inline-flex;
    align-items:center;
    gap:.55rem;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size: .88rem;
    text-decoration:none;
    padding: .95rem 1.8rem;
    border-radius: 40px;
    transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
  }

  .btn:focus-visible{
    outline: 2px solid var(--orange-dark);
    outline-offset: 3px;
  }

  .btn-primary{
    background: var(--orange);
    color: #fff;
    box-shadow: 0 10px 24px rgba(240,78,35,0.28);
  }
  .btn-primary:hover{ background: var(--orange-dark); transform: translateY(-2px); }

  .btn-outline{
    background: transparent;
    color: var(--ink);
    border: 1.5px solid #E3E3E7;
  }
  .btn-outline:hover{ border-color: var(--ink); transform: translateY(-2px); }

  .btn-outline svg{ width:15px; height:15px; }

  /* ---------- RIGHT COLUMN — PORTRAIT ---------- */

  .portrait-col{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-self:center;
    z-index:2;
  }

  .blob-wrap{
    position:relative;
    width: min(340px, 68vw);
    aspect-ratio: 1 / 1;
  }
  .portrait-frame{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    border-radius:50%;
    border: 7px solid var(--ring);
    overflow:hidden;
    background-color: var(--ring);
    box-shadow: 0 20px 40px var(--ring);
  }

  .portrait-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  

  /* ---------- BACKGROUND DECOR ---------- */

  .bg-ring{
    position:absolute;
    top:50%;
    right:-6vw;
    transform: translateY(-50%);
    width: 46vw;
    max-width: 620px;
    aspect-ratio: 1/1;
    border-radius:50%;
    border: 1px solid #F1D9D0;
    z-index:0;
  }

  /* ---------- RESPONSIVE ---------- */

  @media (max-width: 860px){
    .hero{
      grid-template-columns: 1fr;
      gap: 3.2rem;
      text-align:center;
      padding-top: 7vh;
    }
    .copy{ display:flex; flex-direction:column; align-items:center; }
    h1{ max-width: 16ch; }
    .actions{ justify-content:center; }
    .bg-ring{ display:none; }
  }

  @media (max-width: 420px){
    .hero{ padding: 7vh 6vw; }
    .btn{ padding: .85rem 1.4rem; font-size:.82rem; }
  }
</style>
<body>

<section class="hero">
  <!-- <div class="bg-ring" aria-hidden="true"></div> -->

  <div class="copy">
    <p class="eyebrow">Hello I'm</p>
    <p class="name">Brilliant Ashu</p>
    <h1>Web Designer &amp; Front-End Developer</h1>

    <p class="bio">
      I build clean, considered interfaces — from first sketch to shipped
      code. Focused on layouts that are simple to use and built to hold up
      on every screen.
    </p>

    <div class="actions">
      <a href="#contact" class="btn btn-primary">Hire Me</a>
      <a href="#" class="btn btn-outline">
        Download CV
      </a>
    </div>
  </div>

  <div class="portrait-col">
    <div class="blob-wrap">
      <div class="portrait-frame">
        <img src="portrait.png" alt="Portrait of Brilliant Ashu">
      </div>
    </div>

  </div>

</section>

</body>
</html>
