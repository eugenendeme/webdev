<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brilliant Ashu — Profile Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  :root{
    --purple:#391880;
    --purple-dark:#140436;
    --purple-light:#663dc5;
    --white:#FFFFFF;
    --bg:#F4F1FA;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family:'Poppins', sans-serif;
    background: var(--bg);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 5vh 5vw;
  }

  .card{
    position:relative;
    width: 100%;
    max-width: 300px;
    background: var(--purple);
    border-radius: 22px;
    padding: 2.4rem 1.8rem 1.8rem;
    text-align:center;
    color: var(--white);
    box-shadow: 0 20px 40px rgba(108,74,182,0.28);
  }

  /* ---------- MENU BUTTON ---------- */

  .menu-btn{
    position:absolute;
    top: 1rem;
    right: 1rem;
    width: 30px;
    height: 30px;
    border-radius:50%;
    background: var(--purple-light);
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 3px;
  }

  .menu-btn span{
    width: 3.5px;
    height: 3.5px;
    border-radius:50%;
    background: var(--white);
  }

  /* ---------- AVATAR ---------- */

  .avatar-wrap{
    width: 128px;
    height: 128px;
    margin: 0 auto 1.4rem;
    border-radius:50%;
    background: var(--purple-light);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .avatar-wrap img{
    width: 104px;
    height: 104px;
    border-radius:50%;
    object-fit:cover;
    border: 3px solid var(--white);
  }

  /* ---------- TEXT ---------- */

  .name{
    font-size: 1.3rem;
    font-weight:700;
    margin-bottom: .25rem;
  }

  .role{
    font-size: .82rem;
    font-weight:600;
    color: var(--purple-light);
    background: var(--white);
    display:inline-block;
    padding: .2rem .75rem;
    border-radius: 999px;
    margin-bottom: 1.1rem;
  }

  .bio{
    font-size: .85rem;
    line-height:1.6;
    color: #EDE8F9;
    margin-bottom: 1.6rem;
  }

  .connect-label{
    font-size: .78rem;
    font-weight:600;
    color: #D9CFF0;
    margin-bottom: .9rem;
  }

  /* ---------- SOCIALS ---------- */

  .socials{
    display:flex;
    justify-content:center;
    gap: .8rem;
  }

  .socials a{
    width: 40px;
    height: 40px;
    border-radius:50%;
    background: var(--purple-light);
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background .18s ease, transform .18s ease;
  }

  .socials a:hover{
    background: var(--white);
    transform: translateY(-2px);
  }

  .socials a:hover svg{ fill: var(--purple); }

  .socials svg{
    width: 17px;
    height: 17px;
    fill: var(--white);
    transition: fill .18s ease;
  }

</style>
</head>
<body>

<div class="card">


  <div class="avatar-wrap">
    <img src="eugene.jpg" alt="Eugene's picture">
  </div>

  <h2 class="name">Ndeme Eugene</h2>
  <p class="role">Web Developer</p>

  <p class="bio">
    I'm a web developer passionate about creating dynamic websites and web applications.
  </p>

  <p class="connect-label">connect with me</p>

  <div class="socials">
    <a href="#" aria-label="LinkedIn">
      <svg viewBox="0 0 24 24"><path d="M6.94 8.5H3.56V20h3.38V8.5zM5.25 3.25a1.96 1.96 0 1 0 0 3.92 1.96 1.96 0 0 0 0-3.92zM20.44 20h-3.37v-5.6c0-1.34-.02-3.06-1.87-3.06-1.87 0-2.16 1.46-2.16 2.96V20H9.68V8.5h3.24v1.57h.05c.45-.86 1.56-1.77 3.21-1.77 3.44 0 4.26 2.26 4.26 5.2V20z"/></svg>
    </a>
    <a href="#" aria-label="GitHub">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.28.1-2.66 0 0 .84-.27 2.75 1.02a9.53 9.53 0 0 1 5 0c1.9-1.29 2.74-1.02 2.74-1.02.55 1.38.2 2.41.1 2.66.64.7 1.03 1.59 1.03 2.68 0 3.84-2.35 4.68-4.58 4.93.36.31.68.92.68 1.85v2.74c0 .26.18.58.69.48A10 10 0 0 0 12 2z"/></svg>
    </a>
    <a href="#" aria-label="Instagram">
      <svg viewBox="0 0 24 24"><path d="M12 8.3a3.7 3.7 0 1 0 0 7.4 3.7 3.7 0 0 0 0-7.4zm0 6.1a2.4 2.4 0 1 1 0-4.8 2.4 2.4 0 0 1 0 4.8zM16.9 3.5H7.1A3.6 3.6 0 0 0 3.5 7.1v9.8a3.6 3.6 0 0 0 3.6 3.6h9.8a3.6 3.6 0 0 0 3.6-3.6V7.1a3.6 3.6 0 0 0-3.6-3.6zm2.3 13.4a2.3 2.3 0 0 1-2.3 2.3H7.1a2.3 2.3 0 0 1-2.3-2.3V7.1a2.3 2.3 0 0 1 2.3-2.3h9.8a2.3 2.3 0 0 1 2.3 2.3v9.8zM17.4 6.1a.9.9 0 1 0 0 1.8.9.9 0 0 0 0-1.8z"/></svg>
    </a>
  </div>

</div>

</body>
</html>
