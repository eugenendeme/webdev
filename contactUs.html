<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

/* GLOBAL STYLES & RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    text-decoration: none;
    list-style: none;
}

html {
    scroll-behavior: smooth;
}

body {
    background-color: #ffffff;
    color: #000000;
    overflow-x: hidden;
}
/* FIXED CONTAINER STRUCTURE */
section {
    min-height: 100vh;
    width: 100%;
    padding: 8rem 12%;
    position: relative;
}

.section-title {
    text-align: center;
    color: rgb(108, 2, 117);
    font-size: 3rem;
    font-weight: 600;
    margin-bottom: 4rem;
}


/* CUSTOM SCROLLBAR WITH GRADIENT */
::-webkit-scrollbar {
    width: 20px;
}

::-webkit-scrollbar-track {
    background: #e0e0e0;
}

/* CONTACT INPUT BOX LAYOUT */
.contact {
    display: flex;
    justify-content: center;
    padding: 4rem 0 6rem;
}

.input-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    margin-top: 5rem;
    width: min(100%, 60rem);
    padding: 3rem 3rem 2rem;
    background: #ffffff;
    border-radius: 2.5rem;
    border: 1px solid rgba(0, 0, 0, 0.08);
    box-shadow: 0 25px 30px rgba(148, 3, 153, 0.4);
}

.training-details {
    width: 100%;
    background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
    border-radius: 1.5rem;
    padding: 1rem 1.5rem;
    border: 1px solid rgba(0,0,0,0.05);
    margin-bottom: 1.25rem;
    font-size: 1rem;
    color: rgba(0,0,0,0.85);
    line-height: 1.5;
}

.training-details p { margin: 0.2rem 0; }

.contact-form {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 1.5rem;
}

.input {
    position: relative;
    width: 100%;
}

.input input,
.input textarea {
    border: 2px solid rgba(0, 0, 0, 0.15);
    border-radius: 1.75rem;
    width: 100%;
    padding: 1.6rem 1.8rem 1.6rem 4.5rem;
    font-size: 1.2rem;
    outline: none;
    text-align: left;
    resize: none;
    background: #f8f9ff;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
}

.input input:hover,
.input textarea:hover,
.input input:focus,
.input textarea:focus {
    border-color: rgba(148, 3, 153, 0.4);
    box-shadow: 0 8px 20px rgba(148, 3, 153, 0.4);
}

.input textarea {
    min-height: 14rem;
}

.input input::placeholder,
.input textarea::placeholder {
    font-size: 1.1rem;
    color: rgba(0, 0, 0, 0.55);
}

.input i {
    position: absolute;
    font-size: 1.5rem;
    top: 50%;
    left: 1.5rem;
    transform: translateY(-50%);
    color: rgba(0, 0, 0, 0.55);
}

.textarea-input textarea {
    padding-top: 2.5rem;
}

.textarea-input .input i {
    top: 2.2rem;
    transform: none;
}

.btn {
    width: fit-content;
    border-radius: 4rem;
    min-width: 12rem;
    padding: 1rem 2rem;
}

@media (max-width: 768px) {
    .input-box {
        padding: 2rem 1.5rem 1.5rem;
    }

    .input input,
    .input textarea {
        padding: 1.4rem 1.8rem 1.4rem 4rem;
        font-size: 1rem;
    }

    .btn {
        width: 100%;
    }
}
    </style>
</head>
<body>
     <section id="contact" class="contact">
        <div class="input-box">
            <h2 class="section-title">Contact Us</h2>
            
            <form class="contact-form" action="#" method="post">
                <div class="input">
                    <input type="email" name="email" placeholder="Your email address" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input">
                    <input type="tel" name="phone" placeholder="Your phone number" required>
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="input textarea-input">
                    <textarea name="message" rows="5" placeholder="Write your message here" required></textarea>
                    <i class="fa-solid fa-comment-dots"></i>
                </div>
                <button class="btn" type="submit">Submit</button>
            </form>
        </div>
    </section>
</body>
</html>
